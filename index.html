<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Time Dashboard v3</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ScreenTime">
<link rel="apple-touch-icon" href="/favicon.ico">
<script src="/echarts.min.js?v=3"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{
    --bg:#0a0e27; --card-bg:linear-gradient(135deg,rgba(13,17,42,.95),rgba(20,25,55,.9));
    --border:rgba(99,110,250,.12); --text:#c8d6e5; --text-dim:#5a6b8c;
    --accent:#636efa; --accent2:#a78bfa; --green:#10b981; --amber:#f59e0b; --red:#ef4444;
    --card-solid:#0d112a; --bg-glow:radial-gradient(ellipse at 20% 20%,rgba(99,110,250,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(167,139,250,.04) 0%,transparent 50%);
    --tint:rgba(99,110,250,.08); --tint-hover:rgba(99,110,250,.15); --tint-strong:rgba(99,110,250,.25);
    --echarts-text:#c8d6e5; --echarts-subtext:#5a6b8c;
}
html[data-theme="light"]{
    --bg:#f0f2f5; --card-bg:#fff; --border:#e5e7eb; --text:#1f2937; --text-dim:#9ca3af;
    --accent:#4f46e5; --accent2:#7c3aed; --card-solid:#fff; --bg-glow:none;
    --tint:rgba(79,70,229,.06); --tint-hover:rgba(79,70,229,.12); --tint-strong:rgba(79,70,229,.22);
    --echarts-text:#1f2937; --echarts-subtext:#9ca3af;
}
body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    -webkit-font-smoothing:antialiased; background-image:var(--bg-glow);
}
.container{max-width:1440px;margin:0 auto;padding:20px 24px;}

/* Anomaly banner */
.anomaly-banner{display:none;background:linear-gradient(90deg,rgba(239,68,68,.18),rgba(245,158,11,.1));border:1px solid rgba(239,68,68,.35);border-radius:10px;padding:10px 18px;margin-bottom:14px;animation:blink-border 1.5s infinite;align-items:center;gap:10px;}
.anomaly-banner.show{display:flex;}
.anomaly-banner .ab-icon{font-size:18px;flex-shrink:0;}
.anomaly-banner .ab-text{flex:1;font-size:12px;color:var(--text);line-height:1.5;}
.anomaly-banner .ab-text span{color:var(--red);font-weight:600;}
.anomaly-banner .ab-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:0 4px;}
@keyframes blink-border{0%,100%{border-color:rgba(239,68,68,.35)}50%{border-color:rgba(239,68,68,.8)}}

.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.header-left h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-left .sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.theme-toggle{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:3px;display:flex;cursor:pointer;}
.theme-toggle span{padding:4px 12px;border-radius:16px;font-size:11px;color:var(--text-dim);transition:all .2s;}
.theme-toggle span.active{background:var(--accent);color:#fff;}
.lang-btn{background:var(--tint-hover);border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s;}
.lang-btn:hover{background:var(--tint-strong);}
.lang-btn.active{background:var(--accent);color:#fff;}
.export-btn{background:var(--tint-hover);border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s;}
.export-btn:hover{background:rgba(16,185,129,.2);color:var(--green);border-color:rgba(16,185,129,.3);}
.status-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.dot.live{background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.tabs-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
.tabs{display:flex;gap:3px;background:var(--tint);border-radius:8px;padding:3px;border:1px solid var(--border);}
.tab{padding:6px 16px;font-size:12px;font-weight:500;color:var(--text-dim);cursor:pointer;border-radius:6px;border:none;background:transparent;transition:all .2s;}
.tab.active{background:var(--tint-strong);color:var(--accent);font-weight:600;}
.tab:hover{color:var(--text);}
.date-picker{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);}
.date-picker input{background:var(--card-bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;font-size:11px;width:120px;}
.date-picker button{background:var(--accent);border:none;color:#fff;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;}

/* Metric cards */
.overview{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px;}
.ov-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.ov-card::after{content:'';position:absolute;top:0;left:0;width:100%;height:2px;}
.ov-card.cpu::after{background:linear-gradient(90deg,#636efa,#a78bfa);}
.ov-card.mem::after{background:linear-gradient(90deg,#10b981,#06b6d4);}
.ov-card.gpu::after{background:linear-gradient(90deg,#f472b6,#f59e0b);}
.ov-card.cores::after{background:linear-gradient(90deg,#8b5cf6,#c084fc);}
.ov-card.memgb::after{background:linear-gradient(90deg,#06b6d4,#10b981);}
.ov-card.tabs::after{background:linear-gradient(90deg,#f59e0b,#f472b6);}
.ov-card.cpu{background:linear-gradient(135deg,rgba(99,110,250,.1),rgba(13,17,42,.8));}
.ov-card.mem{background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(13,17,42,.8));}
.ov-card.gpu{background:linear-gradient(135deg,rgba(244,114,182,.1),rgba(13,17,42,.8));}
.ov-card.cores{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(13,17,42,.8));}
.ov-card.memgb{background:linear-gradient(135deg,rgba(6,182,212,.1),rgba(13,17,42,.8));}
.ov-card.tabs{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(13,17,42,.8));}
html[data-theme="light"] .ov-card.cpu{background:linear-gradient(135deg,rgba(79,70,229,.06),#fff);}
html[data-theme="light"] .ov-card.mem{background:linear-gradient(135deg,rgba(5,150,105,.06),#fff);}
html[data-theme="light"] .ov-card.gpu{background:linear-gradient(135deg,rgba(219,39,119,.06),#fff);}
html[data-theme="light"] .ov-card.cores{background:linear-gradient(135deg,rgba(124,58,237,.06),#fff);}
html[data-theme="light"] .ov-card.memgb{background:linear-gradient(135deg,rgba(8,145,178,.06),#fff);}
html[data-theme="light"] .ov-card.tabs{background:linear-gradient(135deg,rgba(217,119,6,.06),#fff);}
.ov-label{font-size:10px;color:var(--text-dim);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;}
.ov-value{font-size:28px;font-weight:800;color:var(--text);line-height:1;transition:all .3s;}
.ov-change{font-size:10px;margin-top:4px;display:flex;align-items:center;gap:4px;}
.ov-change .arrow{font-weight:700;}
.ov-change .arrow.up{color:#ef4444;}
.ov-change .arrow.down{color:#10b981;}
.ov-change .arrow.flat{color:var(--text-dim);}
.ov-change .delta{color:var(--text-dim);}

/* Sparkline row */
.spark-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px;}
.spark-mini{height:40px;}

/* Loading state */
.loading-overlay{text-align:center;padding:40px 0;color:var(--text-dim);font-size:14px;display:none;}
.loading-overlay.show{display:block;}
.loading-dot::after{content:'...';animation:dots 1.2s steps(4,infinite);}
@keyframes dots{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}100%{content:'';}}

/* Charts row */
.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:12px;margin-bottom:18px;}
.chart-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.chart-box h3{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.chart-box h3::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px;}
.chart-echarts{width:100%;}
#hourlyChart{height:280px;}
#donutChart{height:300px;}

/* Horizontal bar chart */
.bar-chart-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px;}
.bar-chart-box h3{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.bar-chart-box h3::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px;}
#barRankChart{height:380px;}

/* Heatmap */
.heatmap-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px;}
.heatmap-box h3{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.heatmap-box h3::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px;}
#heatmapChart{height:220px;}

/* Browser tabs */
.browser-tabs-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px;}
.browser-tabs-box h3{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.browser-tabs-box h3::before{content:'';width:3px;height:12px;background:var(--amber);border-radius:2px;}
.tab-list-scroll{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.tab-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:var(--tint);font-size:11px;}
.tab-item .tab-time{color:var(--text-dim);font-size:10px;min-width:44px;flex-shrink:0;}
.tab-item .tab-browser{color:var(--accent);font-size:10px;min-width:50px;flex-shrink:0;}
.tab-item .tab-title{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Streak */
.streak-badge{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(249,115,22,.1));border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.streak-icon{font-size:22px;flex-shrink:0;}
.streak-text{font-size:12px;color:var(--text);}
.streak-text strong{color:var(--amber);font-size:16px;}
.streak-sub{font-size:10px;color:var(--text-dim);}
.refresh-indicator{font-size:10px;color:var(--text-dim);text-align:right;margin-bottom:4px;opacity:.7;}
.refresh-indicator span{color:var(--accent);}

/* Insight */
.insight-box{background:var(--card-bg);border:1px solid var(--tint-strong);border-radius:10px;padding:16px 18px;margin-bottom:18px;}
.insight-box h3{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;color:var(--amber);}
.insight-box h3::before{content:'';width:3px;height:12px;background:var(--amber);border-radius:2px;}
.insight-item{padding:4px 0;font-size:11px;color:var(--text-dim);line-height:1.6;padding-left:12px;position:relative;}
.insight-item::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;background:var(--amber);border-radius:50%;}
.insight-wait{font-size:11px;color:var(--text-dim);text-align:center;padding:8px;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card-solid);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:640px;width:90%;max-height:80vh;overflow-y:auto;color:var(--text);}
.modal h2{font-size:16px;margin-bottom:14px;}
.modal-close{float:right;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;}
#modalEcharts{width:100%;height:220px;}
.modal .tab-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}
.modal .tab-chip{background:var(--tint);padding:3px 8px;border-radius:4px;font-size:10px;color:var(--text-dim);}

::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="container">
    <!-- Anomaly Banner -->
    <div class="anomaly-banner" id="anomalyBanner">
        <span class="ab-icon">⚠️</span>
        <span class="ab-text" id="anomalyText"></span>
        <button class="ab-close" onclick="dismissAnomaly()">&times;</button>
    </div>

    <div class="header">
        <div class="header-left">
            <h1 data-i18n="title"></h1>
            <div class="sub">
                <span id="headerDate"></span>
                <span id="currentTime" style="margin-left:10px;color:var(--accent);font-weight:500;"></span>
            </div>
        </div>
        <div class="header-right">
            <div class="theme-toggle" onclick="toggleTheme()">
                <span class="active" data-tt="dark">暗色</span>
                <span data-tt="light">亮色</span>
            </div>
            <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中文</button>
            <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
            <button class="export-btn" onclick="exportCSV()" data-i18n="exportBtn">Export</button>
            <span class="status-dot"><span class="dot live"></span> <span data-i18n="live"></span></span>
        </div>
    </div>

    <div class="tabs-row">
        <div class="tabs">
            <button class="tab active" data-range="today" data-i18n="tabToday"></button>
            <button class="tab" data-range="week" data-i18n="tabWeek"></button>
            <button class="tab" data-range="month" data-i18n="tabMonth"></button>
            <button class="tab" data-range="custom" data-i18n="tabCustom"></button>
        </div>
        <div class="date-picker" id="datePicker" style="display:none">
            <input type="date" id="dateStart"><span>~</span><input type="date" id="dateEnd">
            <button onclick="applyCustomRange()">Go</button>
        </div>
    </div>

    <!-- Metric cards -->
    <div class="overview" id="metricCards">
        <div class="ov-card cpu">
            <div class="ov-label" data-i18n="ovCpu">CPU 使用率</div>
            <div class="ov-value" id="cpuVal">--</div>
            <div class="ov-change" id="cpuChange"></div>
        </div>
        <div class="ov-card mem">
            <div class="ov-label" data-i18n="ovMem">内存使用率</div>
            <div class="ov-value" id="memVal">--</div>
            <div class="ov-change" id="memChange"></div>
        </div>
        <div class="ov-card cores">
            <div class="ov-label" data-i18n="ovCores">CPU 核心数</div>
            <div class="ov-value" id="cpuCores">--</div>
            <div class="ov-change" id="coresChange"></div>
        </div>
        <div class="ov-card gpu">
            <div class="ov-label" data-i18n="ovGpu">GPU 占用</div>
            <div class="ov-value" id="gpuVal">--</div>
            <div class="ov-change" id="gpuChange"></div>
        </div>
        <div class="ov-card memgb">
            <div class="ov-label" data-i18n="ovMemGb">内存占用 GB</div>
            <div class="ov-value" id="memUsedGb">--</div>
            <div class="ov-change" id="memGbChange"></div>
        </div>
        <div class="ov-card tabs">
            <div class="ov-label" data-i18n="ovTabs">浏览器标签</div>
            <div class="ov-value" id="tabCount">--</div>
            <div class="ov-change" id="tabChange"></div>
        </div>
    </div>

    <!-- Loading indicator -->
    <div class="loading-overlay" id="loadingOverlay">正在加载<span class="loading-dot"></span></div>

    <!-- Sparklines -->
    <div class="spark-row">
        <div class="spark-mini" id="sparkCpuE"></div>
        <div class="spark-mini" id="sparkMemE"></div>
        <div class="spark-mini" id="sparkCoresE"></div>
        <div class="spark-mini" id="sparkGpuE"></div>
        <div class="spark-mini" id="sparkMemGbE"></div>
        <div class="spark-mini" id="sparkTabE"></div>
    </div>

    <!-- Charts row: hourly trend + donut -->
    <div class="charts-row">
        <div class="chart-box">
            <h3 id="chartTitle">Hourly Trend</h3>
            <div class="chart-echarts" id="hourlyChart"></div>
        </div>
        <div class="chart-box">
            <h3 data-i18n="donutTitle"></h3>
            <div class="chart-echarts" id="donutChart"></div>
        </div>
    </div>

    <!-- TOP10 horizontal bar chart -->
    <div class="bar-chart-box">
        <h3 data-i18n="rankTitle">应用使用排行 TOP10</h3>
        <div class="chart-echarts" id="barRankChart"></div>
    </div>

    <!-- Heatmap -->
    <div class="heatmap-box">
        <h3 data-i18n="heatmapTitle"></h3>
        <div class="chart-echarts" id="heatmapChart"></div>
    </div>

    <!-- Streak + refresh -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
        <div class="streak-badge" id="streakBadge" style="display:none">
            <span class="streak-icon">🔥</span>
            <div><span class="streak-text">连续活跃 <strong id="streakDays">0</strong> 天</span>
            <div class="streak-sub">每天使用超过 10 分钟</div></div>
        </div>
        <div class="refresh-indicator" id="refreshInfo" style="margin-left:auto">已更新于 <span id="refreshTime"></span></div>
    </div>

    <!-- Browser tabs -->
    <div class="browser-tabs-box" id="browserTabsBox" style="display:none">
        <h3><span data-i18n="browserTitle">🌐 浏览器标签活动</span></h3>
        <div class="tab-list-scroll" id="browserTabsList"></div>
    </div>

    <!-- Browser history -->
    <div class="browser-tabs-box" id="browserHistoryBox">
        <h3><span data-i18n="browserHistory">📖 今日浏览</span></h3>
        <div class="tab-list-scroll" id="browserHistoryList"><span class="insight-wait">...</span></div>
    </div>

    <!-- Insights -->
    <div class="insight-box">
        <h3 data-i18n="insightTitle"></h3>
        <div id="insightsContent" class="insight-wait">...</div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle"></h2>
            <div class="chart-echarts" id="modalEcharts"></div>
            <div class="tab-list" id="modalTabs"></div>
        </div>
    </div>
</div>

<script>
let currentLang='zh', currentRange='today', currentTheme='dark';
const API='/api';
const CACHE_PREFIX='screen_time_cache_';
const CACHE_TTL=5*60*1000;
let ws=null, wsConnected=false, wsReconnectTimer=null;
let prevMetrics={cpu:null,mem:null,gpu:null,memGb:null,tabCount:null};

// ECharts instances
let hourlyChartInst=null, donutChartInst=null, barRankInst=null, heatmapInst=null, modalChartInst=null;
const sparkInsts={};

// ============ I18N ============
const I18N={
zh:{title:'屏幕使用时间 · 数据看板',live:'实时采集',tabToday:'今日',tabWeek:'本周',tabMonth:'本月',tabCustom:'自定义',
donutTitle:'应用使用占比',heatmapTitle:'7日热力图',rankTitle:'应用使用排行 TOP10',
insightTitle:'使用建议与洞察',exportBtn:'导出CSV',
noData:'暂无数据',analyzing:'分析中...',goodHabit:'使用习惯良好',browserTitle:'浏览器标签活动',browserHistory:'今日浏览',
fmtH:'小时',fmtM:'分钟',fmtCount:'次',fmtItem:'条',tabsUnit:' 个',dailyAvg:'日均 ·',daysStat:'天统计',asOf:'截止',
categories:{office:'办公',dev:'开发',browser:'浏览器',social:'社交',entertainment:'娱乐',tool:'工具',other:'其他'},
weekdays:['一','二','三','四','五','六','日'],
ovCpu:'CPU 使用率',ovMem:'内存使用率',ovCores:'CPU 核心数',ovGpu:'GPU 占用',ovMemGb:'内存占用 GB',ovTabs:'浏览器标签',
anomalyCpu:'CPU 连续高负载',anomalyMem:'内存使用率过高',anomalyApp:'应用超时使用',anomalyLate:'深夜活跃',
anomalySuffixCpu:'连续3个采集点 > 80%',anomalySuffixMem:'超过 90%',anomalySuffixApp:'单日使用 > 6h',anomalySuffixLate:'0-6点活跃 > 30min'},
en:{title:'Screen Time Dashboard',live:'Live',tabToday:'Today',tabWeek:'Week',tabMonth:'Month',tabCustom:'Custom',
donutTitle:'App Share',heatmapTitle:'7-Day Heatmap',rankTitle:'App Usage Ranking TOP10',
insightTitle:'Insights',exportBtn:'Export CSV',
noData:'No data',analyzing:'Analyzing...',goodHabit:'Good habits',browserTitle:'Browser Tabs',browserHistory:'Today Browsing',
fmtH:'h',fmtM:'m',fmtCount:'',fmtItem:'',tabsUnit:' tabs',dailyAvg:'Daily avg ·',daysStat:'days',asOf:'as of',

// ============ Cache layer ============
function cacheGet(key){try{const r=localStorage.getItem(CACHE_PREFIX+key);if(!r)return null;const e=JSON.parse(r);if(Date.now()-e.ts>CACHE_TTL){localStorage.removeItem(CACHE_PREFIX+key);return null;}return e.data;}catch{return null;}}

// ============ ECharts availability check ============
function echartsOk(){ return typeof echarts!=='undefined'; }

function showChartFallback(containerId, msg){
    var el=document.getElementById(containerId);
    if(!el)return;
    el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;min-height:100px;color:var(--text-dim);font-size:13px;">'+(msg||'图表加载失败')+'</div>';
}

function safeInitChart(containerId, initFn){
    if(!echartsOk()){
        showChartFallback(containerId);
        return null;
    }
    try{ return initFn(); }catch(e){ showChartFallback(containerId); return null; }
}

function safeRenderChart(containerId, renderFn){
    if(!echartsOk()){ showChartFallback(containerId); return; }
    try{ renderFn(); }catch(e){
        // Clear stale instance so next render can re-init
        var map={hourlyChart:'hourlyChartInst',donutChart:'donutChartInst',barRankChart:'barRankInst',heatmapChart:'heatmapInst'};
        if(map[containerId]) window[map[containerId]]=null;
        showChartFallback(containerId);
    }
}

// ============ Number scroll animation ============
function animateValue(elId, newVal, suffix, duration){
    const el=document.getElementById(elId);if(!el)return;
    const curText=el.textContent||'0';
    const curNum=parseFloat(curText)||0;
    const newNum=parseFloat(newVal)||0;
    if(curNum===newNum){el.textContent=newVal+(suffix||'');return;}
    const start=performance.now();
    function step(ts){
        const p=Math.min((ts-start)/duration,1);
        const eased=1-Math.pow(1-p,3);
        const v=curNum+(newNum-curNum)*eased;
        if(typeof newVal==='string'&&newVal.includes('.')){
            el.textContent=v.toFixed(1)+(suffix||'');
        }else{
            el.textContent=Math.round(v)+(suffix||'');
        }
        if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

function renderChange(elId, prev, cur, unit){
    const el=document.getElementById(elId);if(!el)return;
    if(prev===null||prev===undefined){el.innerHTML='';return;}
    const d=cur-prev;
    if(Math.abs(d)<0.05){el.innerHTML='<span class="arrow flat">→</span> <span class="delta">'+d.toFixed(1)+unit+'</span>';return;}
    const arrow=d>0?'↑':'↓';
    const cls=d>0?'up':'down';
    el.innerHTML='<span class="arrow '+cls+'">'+arrow+'</span> <span class="delta">'+Math.abs(d).toFixed(1)+unit+'</span>';
}

function fmtTime(s){
    if(!s||s<60)return '0 '+t('fmtM');
    const h=Math.floor(s/3600),m=Math.round((s%3600)/60);
    if(currentLang==='zh')return (h?h+' '+t('fmtH')+' ':'')+(m?m+' '+t('fmtM'):h?'':'');
    return (h?h+t('fmtH')+' ':'')+(m?m+t('fmtM'):h?'':'');
}

function drilldownCategory(catName){
    // Convert display name back to category key
    const catMap={};
    Object.entries(I18N[currentLang].categories).forEach(([k,v])=>{catMap[v]=k;});
    Object.entries(I18N.zh.categories).forEach(([k,v])=>{catMap[v]=k;});
    Object.entries(I18N.en.categories).forEach(([k,v])=>{catMap[v]=k;});
    const catKey=catMap[catName]||'other';
    fetchAPI(API+'/today').then(d=>{
        if(!d||!d.apps)return;
        const catApps=(d.apps||[]).filter(a=>{
            const pn=(a.process_name||'').toLowerCase();
            return getCategory(pn)===catKey;
        });
        document.getElementById('modalTitle').textContent=catName+' - '+(currentLang==='zh'?'应用明细':'App Details');
        document.getElementById('modalTabs').innerHTML='';
        if(!echartsOk())return;
        if(!modalChartInst){try{modalChartInst=echarts.init(document.getElementById('modalEcharts'));}catch(e){return;}}
        const colors=getEChartsColors();
        const names=catApps.slice(0,10).map(a=>cnName(a.process_name));
        const values=catApps.slice(0,10).map(a=>a.foreground_seconds||a.total_seconds||0);
        try{
        modalChartInst.setOption({
            ...makeEChartsOpts(),
            tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
            grid:{left:120,right:50,top:10,bottom:20},
            xAxis:{type:'value',axisLabel:{color:getEChartsSubColor(),fontSize:9}},
            yAxis:{type:'category',data:names,axisLabel:{color:getEChartsTextColor(),fontSize:10}},
            series:[{type:'bar',data:values.map((v,i)=>({value:v,itemStyle:{color:colors[i%colors.length],borderRadius:[0,3,3,0]}})),barMaxWidth:16}]
        },true);
        }catch(e){}
        document.getElementById('modalOverlay').classList.add('show');
    });
}

    const cats={
        'chrome.exe':'browser','msedge.exe':'browser','firefox.exe':'browser',
        'winword.exe':'office','excel.exe':'office','powerpnt.exe':'office','outlook.exe':'office',
        'vscode.exe':'dev','devenv.exe':'dev','pycharm.exe':'dev',
        'wechat.exe':'social','qq.exe':'social','dingtalk.exe':'social','telegram.exe':'social','discord.exe':'social',
        'steam.exe':'entertainment','spotify.exe':'entertainment','qqmusic.exe':'entertainment','vlc.exe':'entertainment',

async function refresh(){
    const loading=document.getElementById('loadingOverlay');
    if(loading)loading.classList.add('show');
    try{
    const n=new Date();
    const range=getRange();
    document.getElementById('headerDate').textContent=range.s===range.e?n.getFullYear()+(currentLang==='zh'?'年':'/')+(n.getMonth()+1)+(currentLang==='zh'?'月':'/')+n.getDate()+(currentLang==='zh'?'日':''):range.s+' ~ '+range.e;

    if(currentRange==='today'){
        const d=await fetchAPI(API+'/today');
        if(d){
            const apps=d.apps||[], hourly=d.hourly||[], totalSec=d.total_active_seconds||0;
            cacheSet('today',d);
            document.getElementById('chartTitle').textContent=currentLang==='zh'?'每小时使用趋势':'Hourly Trend';
            safeRenderChart('hourlyChart',function(){renderHourlyChart(hourly, hourly.map(()=>null));});
            safeRenderChart('donutChart',function(){renderDonutChart(d.categories,totalSec);});
            safeRenderChart('barRankChart',function(){renderBarRankChart(apps,totalSec);});
        }
    }else{
        const d=await fetchAPI(API+'/custom-range?start='+range.s+'&end='+range.e);
        if(d){
            const apps=d.apps||[], totalSec=d.total_seconds||0;
            document.getElementById('chartTitle').textContent=currentLang==='zh'?'每日使用趋势':'Daily Trend';
            safeRenderChart('donutChart',function(){renderDonutChart(d.categories,totalSec);});
            safeRenderChart('barRankChart',function(){renderBarRankChart(apps,totalSec);});
            const secs=(d.daily||[]).map(x=>x.total_active_seconds||0);
            const labels=(d.daily||[]).map(x=>(x.date||'').slice(5));
            if(echartsOk()&&hourlyChartInst){
                try{
                hourlyChartInst.setOption({
                    xAxis:{data:labels},
                    series:[{data:secs},{data:secs.map(()=>null)}]
                },true);
                }catch(e){showChartFallback('hourlyChart');}
            }
        }
    }

    const hm=await fetchAPI(API+'/heatmap');if(hm)safeRenderChart('heatmapChart',function(){renderHeatmapChart(hm.heatmap);});
    const ins=await fetchAPI(API+'/insights');
    const el=document.getElementById('insightsContent');
    if(ins){if(!ins.ready)el.innerHTML='<div class="insight-wait">'+ins.message+'</div>';
    else if(!ins.insights||!ins.insights.length)el.innerHTML='<div class="insight-wait">'+t('goodHabit')+'</div>';
    else el.innerHTML=ins.insights.map(i=>'<div class="insight-item">'+i+'</div>').join('');}
    loadSystemMetrics().catch(()=>{});
    loadBrowserTabs().catch(()=>{});
    loadBrowserHistory().catch(()=>{});
    loadStreaks().catch(()=>{});
    loadAnomalies().catch(()=>{});
    updateRefreshTime();
    }finally{if(loading)loading.classList.remove('show');}
}

function updateRefreshTime(){document.getElementById('refreshTime').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function updateCurrentTime(){
    const now=new Date();
    document.getElementById('currentTime').textContent=now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ============ WebSocket ============
function connectWebSocket(){
    if(typeof io!=='undefined'){
        const socket=io({transports:['websocket']});
        socket.on('connect',()=>{wsConnected=true;document.querySelector('.dot').classList.add('live');});
        socket.on('data_update',()=>{refreshTodayCards();});
        socket.on('disconnect',()=>{wsConnected=false;document.querySelector('.dot').classList.remove('live');if(!wsReconnectTimer)wsReconnectTimer=setInterval(refreshTodayCards,5000);});
        ws=socket;
    }else{
        const protocol=location.protocol==='https:'?'wss:':'ws:';
        try{
            ws=new WebSocket(protocol+'//'+location.host+'/socket.io/?EIO=4&transport=websocket');
            ws.onopen=()=>{wsConnected=true;document.querySelector('.dot').classList.add('live');if(wsReconnectTimer){clearInterval(wsReconnectTimer);wsReconnectTimer=null;}};
            ws.onmessage=(event)=>{try{const msg=JSON.parse(event.data);if(msg.event==='data_update')refreshTodayCards();}catch{}};
            ws.onclose=()=>{wsConnected=false;document.querySelector('.dot').classList.remove('live');if(!wsReconnectTimer)wsReconnectTimer=setInterval(refreshTodayCards,5000);setTimeout(connectWebSocket,3000);};
            ws.onerror=()=>{ws.close();};
        }catch(e){if(!wsReconnectTimer)wsReconnectTimer=setInterval(refreshTodayCards,5000);}
    }
}

async function refreshTodayCards(){
    const d=await fetchAPI(API+'/today');
    if(d){
        cacheSet('today',d);
        const apps=d.apps||[],hourly=d.hourly||[],totalSec=d.total_active_seconds||0;
        safeRenderChart('hourlyChart',function(){renderHourlyChart(hourly,hourly.map(()=>null));});
        safeRenderChart('donutChart',function(){renderDonutChart(d.categories,totalSec);});
        safeRenderChart('barRankChart',function(){renderBarRankChart(apps,totalSec);});
    }
    loadSystemMetrics().catch(()=>{});
    loadBrowserTabs().catch(()=>{});
    loadBrowserHistory().catch(()=>{});
    loadAnomalies().catch(()=>{});
    updateRefreshTime();
}

function loadSocketIO(){
    const script=document.createElement('script');
    script.src='https://cdn.bootcdn.net/ajax/libs/socket.io/4.7.2/socket.io.min.js';
    script.onload=()=>connectWebSocket();
    script.onerror=()=>connectWebSocket();
    document.head.appendChild(script);
}

// ============ Theme / Lang ============
function toggleTheme(){
    currentTheme=currentTheme==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',currentTheme);
    document.querySelectorAll('.theme-toggle span').forEach(s=>s.classList.toggle('active',s.dataset.tt===currentTheme));
    localStorage.setItem('screen_time_theme',currentTheme);
    refresh();
}
function switchLang(l){
    currentLang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
    document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});
    refresh();
}

// ============ Helpers ============
function cnName(n){const k=(n||'').toUpperCase();const NAMES={...NAME_MAP};if(NAMES[k])return NAMES[k][currentLang]||NAMES[k].zh;return(n||'').replace(/\.exe$/i,'').replace(/[-_]/g,' ');}
const NAME_MAP={'MARVIS.EXE':{zh:'Marvis',en:'Marvis'},'EXPLORER.EXE':{zh:'文件资源管理器',en:'Explorer'},'CHROME.EXE':{zh:'Chrome',en:'Chrome'},'MSEDGE.EXE':{zh:'Edge',en:'Edge'},'FIREFOX.EXE':{zh:'Firefox',en:'Firefox'},'WINWORD.EXE':{zh:'Word',en:'Word'},'EXCEL.EXE':{zh:'Excel',en:'Excel'},'POWERPNT.EXE':{zh:'PPT',en:'PPT'},'OUTLOOK.EXE':{zh:'Outlook',en:'Outlook'},'VSCODE.EXE':{zh:'VS Code',en:'VS Code'},'WECHAT.EXE':{zh:'微信',en:'WeChat'},'QQ.EXE':{zh:'QQ',en:'QQ'},'STEAM.EXE':{zh:'Steam',en:'Steam'},'SPOTIFY.EXE':{zh:'Spotify',en:'Spotify'},'QQMUSIC.EXE':{zh:'QQ音乐',en:'QQ Music'},'IDLE':{zh:'空闲',en:'Idle'}};

function getRange(){
    const n=new Date(),t=n.toISOString().slice(0,10);
    if(currentRange==='today')return{s:t,e:t};
    if(currentRange==='week'){const d=new Date(n);d.setDate(d.getDate()-(d.getDay()||7)+1);return{s:d.toISOString().slice(0,10),e:t};}
    if(currentRange==='month')return{s:n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-01',e:t};
    return{s:document.getElementById('dateStart').value||t,e:document.getElementById('dateEnd').value||t};
}
function exportCSV(){const range=getRange();window.open(API+'/export?start='+range.s+'&end='+range.e,'_blank');}
function applyCustomRange(){currentRange='custom';refresh();}

// ============ Init ============
document.querySelectorAll('.tab').forEach(btn=>{btn.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');currentRange=this.dataset.range;
    document.getElementById('datePicker').style.display=currentRange==='custom'?'flex':'none';

const savedTheme=localStorage.getItem('screen_time_theme')||'dark';
currentTheme=savedTheme;document.documentElement.setAttribute('data-theme',savedTheme);
document.querySelectorAll('.theme-toggle span').forEach(s=>s.classList.toggle('active',s.dataset.tt===savedTheme));

// Init all ECharts instances (with safety wrappers)
safeInitChart('hourlyChart',initHourlyChart);
safeInitChart('donutChart',initDonutChart);
safeInitChart('barRankChart',initBarRankChart);
safeInitChart('heatmapChart',initHeatmapChart);
if(echartsOk()){ try{initSparkCharts();}catch(e){} }

// PWA - only register if not already active
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){if(regs.length===0){navigator.serviceWorker.register('/sw.js?v=6');}else{regs[0].update();}}).catch(function(){});}

// Initial load
switchLang(currentLang);// fills i18n texts + refresh
loadSocketIO();
setTimeout(()=>{if(!wsConnected&&!wsReconnectTimer){wsReconnectTimer=setInterval(refreshTodayCards,5000);}},5000);
updateCurrentTime();setInterval(updateCurrentTime,1000);

// Handle resize
window.addEventListener('resize',()=>{
    try{
    [hourlyChartInst,donutChartInst,barRankInst,heatmapInst,modalChartInst].forEach(c=>{if(c)c.resize();});
    Object.values(sparkInsts).forEach(c=>{if(c)c.resize();});
    }catch(e){}
});
