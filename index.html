<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Time Dashboard v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{
    --bg: #0a0e27; --card-bg: linear-gradient(135deg, rgba(13,17,42,.95), rgba(20,25,55,.9));
    --border: rgba(99,110,250,.1); --text: #c8d6e5; --text-dim: #5a6b8c;
    --accent: #636efa; --accent2: #a78bfa; --green: #10b981; --amber: #f59e0b; --red: #ef4444;
    --card-solid: #0d112a; --bg-glow: radial-gradient(ellipse at 20% 20%, rgba(99,110,250,.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(167,139,250,.04) 0%, transparent 50%);
    --tint: rgba(99,110,250,.08); --tint-hover: rgba(99,110,250,.15); --tint-strong: rgba(99,110,250,.25);
    --heatmap-0: rgba(99,110,250,.04); --heatmap-1: rgba(99,110,250,.15); --heatmap-2: rgba(99,110,250,.35); --heatmap-3: rgba(99,110,250,.6); --heatmap-4: #818cf8;
}
html[data-theme="light"]{
    --bg: #f0f2f5; --card-bg: #fff; --border: #e5e7eb; --text: #1f2937; --text-dim: #9ca3af;
    --accent: #4f46e5; --accent2: #7c3aed; --card-solid: #fff; --bg-glow: none;
    --tint: rgba(79,70,229,.06); --tint-hover: rgba(79,70,229,.12); --tint-strong: rgba(79,70,229,.22);
    --heatmap-0: rgba(79,70,229,.05); --heatmap-1: rgba(79,70,229,.18); --heatmap-2: rgba(79,70,229,.4); --heatmap-3: rgba(79,70,229,.65); --heatmap-4: #4f46e5;
}
body{
    font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased; background-image: var(--bg-glow);
}
.container{max-width:1440px;margin:0 auto;padding:20px 24px;}

.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.header-left h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-left .sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.theme-toggle{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:3px;display:flex;cursor:pointer;}
.theme-toggle span{padding:4px 12px;border-radius:16px;font-size:11px;color:var(--text-dim);transition:all .2s;}
.theme-toggle span.active{background:var(--accent);color:#fff;}
.lang-btn{background:var(--tint-hover);border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s;}
.lang-btn:hover{background:var(--tint-strong);}
.lang-btn.active{background:var(--accent);color:#fff;}
.export-btn{background:var(--tint-hover);border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s;}
.export-btn:hover{background:rgba(16,185,129,.2);color:var(--green);border-color:rgba(16,185,129,.3);}
.status-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.dot.live{background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.tabs-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
.tabs{display:flex;gap:3px;background:var(--tint);border-radius:8px;padding:3px;border:1px solid var(--border);}
.tab{padding:6px 16px;font-size:12px;font-weight:500;color:var(--text-dim);cursor:pointer;border-radius:6px;border:none;background:transparent;transition:all .2s;}
.tab.active{background:var(--tint-strong);color:var(--accent);font-weight:600;}
.tab:hover{color:var(--text);}
.date-picker{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);}
.date-picker input{background:var(--card-bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;font-size:11px;width:120px;}
.date-picker button{background:var(--accent);border:none;color:#fff;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;}

.overview{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px;}
.ov-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px 18px;position:relative;overflow:hidden;}
.ov-card::after{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:.5;}
.ov-label{font-size:10px;color:var(--text-dim);margin-bottom:3px;letter-spacing:.5px;}
.ov-value{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1;}
.ov-change{font-size:10px;color:var(--text-dim);margin-top:3px;}

.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:12px;margin-bottom:18px;}
.chart-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.chart-box h3,.data-table-box h3,.insight-box h3,.heatmap-box h3,.category-box h3{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.chart-box h3::before,.data-table-box h3::before,.heatmap-box h3::before,.category-box h3::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px;}

.bar-chart{display:flex;align-items:flex-end;gap:5px;height:130px;padding-bottom:20px;}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative;cursor:pointer;}
.bar-track{width:100%;max-width:28px;border-radius:3px;min-height:2px;background:var(--tint);position:relative;overflow:hidden;}
.bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:3px;background:linear-gradient(180deg,var(--accent),#818cf8);transition:height .4s cubic-bezier(.4,0,.2,1);}
.bar-group.selected .bar-fill{background:linear-gradient(180deg,var(--amber),#fbbf24);}
.bar-label{position:absolute;bottom:-18px;font-size:9px;color:var(--text-dim);white-space:nowrap;}
.bar-value{font-size:9px;color:var(--accent);margin-bottom:2px;font-weight:500;min-height:12px;}

.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.donut-legend{width:100%;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-dim);}
.legend-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0;}

.heatmap-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px;}
.heatmap-grid{display:grid;grid-template-columns:auto repeat(24,1fr);gap:2px;font-size:10px;}
.hm-label{color:var(--text-dim);padding:2px 4px;text-align:right;}
.hm-cell{border-radius:2px;aspect-ratio:1;min-width:12px;transition:all .2s;}
.hm-cell:hover{transform:scale(1.3);z-index:1;}
.hm-legend{display:flex;justify-content:flex-end;gap:6px;align-items:center;margin-top:8px;font-size:9px;color:var(--text-dim);}

.category-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px;}
.cat-list{display:flex;gap:12px;flex-wrap:wrap;}
.cat-item{flex:1;min-width:120px;text-align:center;padding:10px;border-radius:8px;background:var(--tint);}
.cat-name{font-size:11px;color:var(--text-dim);margin-bottom:3px;}
.cat-val{font-size:20px;font-weight:600;color:var(--text);}
.cat-pct{font-size:10px;color:var(--accent);}

.data-table-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead th{text-align:left;padding:8px;color:var(--text-dim);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);cursor:default;}
thead th.sortable{cursor:pointer;}
tbody td{padding:8px;border-bottom:1px solid var(--tint);}
tbody tr:hover{background:var(--tint);}
td.name{font-weight:500;cursor:pointer;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color .2s;}
td.name:hover{text-decoration-color:var(--accent);}
td.time{font-weight:600;color:var(--accent);}
.progress-bar{width:50px;height:3px;background:var(--tint);border-radius:2px;display:inline-block;vertical-align:middle;margin-left:4px;}
.progress-fill{height:100%;border-radius:2px;transition:width .5s;}

.insight-box{background:var(--card-bg);border:1px solid var(--tint-strong);border-radius:10px;padding:16px 18px;margin-bottom:18px;}
.insight-box h3{color:var(--amber);}
.insight-item{padding:4px 0;font-size:11px;color:var(--text-dim);line-height:1.6;padding-left:12px;position:relative;}
.insight-item::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;background:var(--amber);border-radius:50%;}
.insight-wait{font-size:11px;color:var(--text-dim);text-align:center;padding:8px;}
.empty-state{text-align:center;padding:24px;color:var(--text-dim);font-size:12px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card-solid);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;color:var(--text);}
.modal h2{font-size:16px;margin-bottom:14px;}
.modal-close{float:right;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;}
.modal .bar-chart{height:100px;}
.modal .tab-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}
.modal .tab-chip{background:var(--tint);padding:3px 8px;border-radius:4px;font-size:10px;color:var(--text-dim);}

::-webkit-scrollbar{width:0}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
tr{animation:fadeIn .3s ease both}

/* System metrics */
.metrics-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:12px;margin-bottom:18px;}
.metric-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;}
.metric-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.metric-icon.cpu{background:linear-gradient(135deg,rgba(99,110,250,.2),rgba(167,139,250,.1));color:var(--accent);}
.metric-icon.mem{background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(6,182,212,.1));color:var(--green);}
.metric-icon.gpu{background:linear-gradient(135deg,rgba(244,114,182,.2),rgba(245,158,11,.1));color:var(--pink);}
.metric-icon.tab{background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(244,114,182,.1));color:var(--amber);}
.metric-info{flex:1;}
.metric-label{font-size:10px;color:var(--text-dim);margin-bottom:2px;letter-spacing:.3px;}
.metric-value{font-size:22px;font-weight:800;color:var(--text);}
.metric-sub{font-size:9px;color:var(--text-dim);margin-top:1px;}
.metric-spark{width:60px;height:28px;flex-shrink:0;}
.metric-spark canvas{width:100%;height:100%;}

/* Trend badges */
.trend-up{color:#ef4444;font-size:10px;}
.trend-down{color:#10b981;font-size:10px;}
.trend-neutral{color:var(--text-dim);font-size:10px;}
.ov-change .trend-up,.ov-change .trend-down,.ov-change .trend-neutral{font-size:10px;}

/* Browser tabs section */
.browser-tabs-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px;}
.browser-tabs-box h3{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.browser-tabs-box h3::before{content:'';width:3px;height:12px;background:var(--amber);border-radius:2px;}
.tab-list-scroll{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.tab-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:var(--tint);font-size:11px;}
.tab-item .tab-time{color:var(--text-dim);font-size:10px;min-width:44px;flex-shrink:0;}
.tab-item .tab-browser{color:var(--accent);font-size:10px;min-width:50px;flex-shrink:0;}
.tab-item .tab-title{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Streak card */
.streak-badge{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(249,115,22,.1));border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.streak-icon{font-size:22px;flex-shrink:0;}
.streak-text{font-size:12px;color:var(--text);}
.streak-text strong{color:var(--amber);font-size:16px;}
.streak-sub{font-size:10px;color:var(--text-dim);}

/* Refresh indicator */
.refresh-indicator{font-size:10px;color:var(--text-dim);text-align:right;margin-bottom:4px;opacity:.7;}
.refresh-indicator span{color:var(--accent);}

/* View toggle */
.view-toggle{margin-left:auto;display:flex;gap:4px;background:var(--tint);border-radius:6px;padding:2px;}
.view-toggle button{padding:3px 8px;border:none;background:transparent;color:var(--text-dim);font-size:10px;border-radius:4px;cursor:pointer;}
.view-toggle button.active{background:var(--tint-strong);color:var(--accent);}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <h1 data-i18n="title"></h1>
            <div class="sub">
                <span id="headerDate"></span>
                <span id="currentTime" style="margin-left: 10px; color: var(--accent); font-weight: 500;"></span>
            </div>
        </div>
        <div class="header-right">
            <div class="theme-toggle" onclick="toggleTheme()">
                <span class="active" data-tt="dark">暗色</span>
                <span data-tt="light">亮色</span>
            </div>
            <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中文</button>
            <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
            <button class="export-btn" onclick="exportCSV()" data-i18n="exportBtn">Export</button>
            <span class="status-dot"><span class="dot live"></span> <span data-i18n="live"></span></span>
        </div>
    </div>

    <div class="tabs-row">
        <div class="tabs">
            <button class="tab active" data-range="today" data-i18n="tabToday"></button>
            <button class="tab" data-range="week" data-i18n="tabWeek"></button>
            <button class="tab" data-range="month" data-i18n="tabMonth"></button>
            <button class="tab" data-range="custom" data-i18n="tabCustom"></button>
        </div>
        <div class="date-picker" id="datePicker" style="display:none">
            <input type="date" id="dateStart"><span>~</span><input type="date" id="dateEnd">
            <button onclick="applyCustomRange()">Go</button>
        </div>
    </div>

    <div class="overview">
        <div class="ov-card"><div class="ov-label" data-i18n="ovActive"></div><div class="ov-value" id="ovActive">--</div><div class="ov-change" id="ovActiveSub"></div></div>
        <div class="ov-card"><div class="ov-label" data-i18n="ovApps"></div><div class="ov-value" id="ovApps">--</div><div class="ov-change" id="ovAppsSub"></div></div>
        <div class="ov-card"><div class="ov-label" data-i18n="ovPickups"></div><div class="ov-value" id="ovPickups">--</div><div class="ov-change" id="ovPickupsSub"></div></div>
        <div class="ov-card"><div class="ov-label" data-i18n="ovNotif"></div><div class="ov-value" id="ovNotif">--</div><div class="ov-change" id="ovNotifSub"></div></div>
        <div class="ov-card"><div class="ov-label" data-i18n="ovIdle"></div><div class="ov-value" id="ovIdle">--</div><div class="ov-change" id="ovIdleSub"></div></div>
        <div class="ov-card" style="border-color:rgba(245,158,11,.2)"><div class="ov-label" data-i18n="ovScore"></div><div class="ov-value" id="ovScore">--</div><div class="ov-change" data-i18n="ovScoreSub"></div></div>
    </div>

    <!-- System metrics -->
    <div class="metrics-row">
        <div class="metric-card">
            <div class="metric-icon cpu">&#x1F4BB;</div>
            <div class="metric-info">
                <div class="metric-label">CPU 使用率</div>
                <div class="metric-value" id="cpuVal">--</div>
                <div class="metric-sub" id="cpuSub"></div>
            </div>
            <div class="metric-spark"><canvas id="sparkCpu" width="60" height="28"></canvas></div>
        </div>
        <div class="metric-card">
            <div class="metric-icon mem">&#x1F9E0;</div>
            <div class="metric-info">
                <div class="metric-label">内存使用率</div>
                <div class="metric-value" id="memVal">--</div>
                <div class="metric-sub" id="memSub"></div>
            </div>
            <div class="metric-spark"><canvas id="sparkMem" width="60" height="28"></canvas></div>
        </div>
        <div class="metric-card">
            <div class="metric-icon cpu">&#x1F4BB;</div>
            <div class="metric-info">
                <div class="metric-label">CPU 核心数</div>
                <div class="metric-value" id="cpuCores">--</div>
                <div class="metric-sub">逻辑核心</div>
            </div>
        </div>
        <div class="metric-card">
            <div class="metric-icon gpu">&#x1F3AE;</div>
            <div class="metric-info">
                <div class="metric-label">GPU 占用</div>
                <div class="metric-value" id="gpuVal">--</div>
                <div class="metric-sub">GPU 使用率</div>
            </div>
        </div>
        <div class="metric-card">
            <div class="metric-icon mem">&#x1F4BE;</div>
            <div class="metric-info">
                <div class="metric-label">内存占用</div>
                <div class="metric-value" id="memUsedGb">--</div>
                <div class="metric-sub">已用 GB</div>
            </div>
        </div>
        <div class="metric-card">
            <div class="metric-icon tab">&#x1F310;</div>
            <div class="metric-info">
                <div class="metric-label">浏览器标签</div>
                <div class="metric-value" id="tabCount">--</div>
                <div class="metric-sub">今日标签活动</div>
            </div>
        </div>
    </div>

    <div class="charts-row">
        <div class="chart-box"><h3 id="chartTitle">Hourly Trend</h3><div class="bar-chart" id="barChart"></div></div>
        <div class="chart-box"><h3 data-i18n="donutTitle"></h3><div class="donut-wrap"><canvas id="donutCanvas" width="130" height="130"></canvas><div class="donut-legend" id="donutLegend"></div></div></div>
    </div>

    <!-- Streak + Refresh indicator -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
        <div class="streak-badge" id="streakBadge" style="display:none">
            <span class="streak-icon">&#x1F525;</span>
            <div><span class="streak-text">连续活跃 <strong id="streakDays">0</strong> 天</span>
            <div class="streak-sub">每天使用超过 10 分钟</div></div>
        </div>
        <div class="refresh-indicator" id="refreshInfo" style="margin-left:auto">已更新于 <span id="refreshTime"></span></div>
    </div>

    <!-- Browser tabs -->
    <div class="browser-tabs-box" id="browserTabsBox" style="display:none">
        <h3><span data-i18n="browserTitle">&#x1F310; 浏览器标签活动</span></h3>
        <div class="tab-list-scroll" id="browserTabsList"></div>
    </div>

    <div class="heatmap-box">
        <h3 data-i18n="heatmapTitle"></h3>
        <div class="heatmap-grid" id="heatmapGrid"></div>
        <div class="hm-legend"><span>低</span><span style="width:12px;height:12px;background:var(--tint-hover);border-radius:2px"></span><span style="width:12px;height:12px;background:var(--heatmap-2);border-radius:2px"></span><span style="width:12px;height:12px;background:var(--accent);border-radius:2px"></span><span style="width:12px;height:12px;background:var(--heatmap-4);border-radius:2px"></span><span>高</span></div>
    </div>

    <div class="category-box">
        <h3 data-i18n="catTitle"></h3>
        <div class="cat-list" id="catList"></div>
    </div>

    <div class="data-table-box">
        <h3 data-i18n="tableTitle"></h3>
        <table><thead><tr>
            <th data-i18n="thRank"></th><th data-i18n="thApp"></th>
            <th class="sortable" data-sort="time" data-i18n="thTime"></th>
            <th data-i18n="thPct"></th>
            <th data-i18n="thSwitch"></th><th data-i18n="thNotif"></th>
        </tr></thead><tbody id="tableBody"></tbody></table>
    </div>

    <div class="insight-box">
        <h3 data-i18n="insightTitle"></h3>
        <div id="insightsContent" class="insight-wait">...</div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle"></h2>
            <div class="bar-chart" id="modalChart"></div>
            <div class="tab-list" id="modalTabs"></div>
        </div>
    </div>
</div>

<script>
let currentLang='zh', currentRange='today', selectedBar=-1, currentTheme='dark';
const API='http://localhost:19999/api';

const I18N={
zh:{title:'屏幕使用时间 · 数据看板',live:'实时采集',tabToday:'今日',tabWeek:'本周',tabMonth:'本月',tabCustom:'自定义',
ovActive:'活跃时长',ovApps:'应用数',ovPickups:'启动次数',ovNotif:'通知',ovIdle:'空闲',ovScore:'效率评分',ovScoreSub:'/ 100',
donutTitle:'应用使用占比',heatmapTitle:'7日热力图',catTitle:'应用分类统计',
tableTitle:'应用使用明细',thRank:'#',thApp:'应用名称',thTime:'使用时长',thPct:'占比',thSwitch:'切换',thNotif:'通知',
insightTitle:'使用建议与洞察',exportBtn:'导出CSV',
noData:'暂无数据',analyzing:'分析中...',goodHabit:'使用习惯良好',idleLabel:'空闲',
fmtH:'小时',fmtM:'分钟',fmtCount:'次',fmtItem:'条',dailyAvg:'日均 ·',daysStat:'天统计',asOf:'截止',
categories:{office:'办公',dev:'开发',browser:'浏览器',social:'社交',entertainment:'娱乐',tool:'工具',other:'其他'},
weekdays:['一','二','三','四','五','六','日']},
en:{title:'Screen Time Dashboard',live:'Live',tabToday:'Today',tabWeek:'Week',tabMonth:'Month',tabCustom:'Custom',
ovActive:'Active Time',ovApps:'Apps',ovPickups:'Pickups',ovNotif:'Notifs',ovIdle:'Idle',ovScore:'Score',ovScoreSub:'/ 100',
donutTitle:'App Share',heatmapTitle:'7-Day Heatmap',catTitle:'Categories',
tableTitle:'App Details',thRank:'#',thApp:'Application',thTime:'Duration',thPct:'Share',thSwitch:'Switch',thNotif:'Notifs',
insightTitle:'Insights',exportBtn:'Export CSV',
noData:'No data',analyzing:'Analyzing...',goodHabit:'Good habits',idleLabel:'Idle',
fmtH:'h',fmtM:'m',fmtCount:'',fmtItem:'',dailyAvg:'Daily avg ·',daysStat:'days',asOf:'as of',
categories:{office:'Office',dev:'Dev',browser:'Browser',social:'Social',entertainment:'Entertainment',tool:'Tool',other:'Other'},
weekdays:['Mon','Tue','Wed','Thu','Fri','Sat','Sun']}};

function t(k){return I18N[currentLang][k]||k;}
function tc(k){return I18N[currentLang].categories[k]||k;}

const PALETTE=['#636efa','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f472b6','#84cc16','#f97316','#64748b'];const PALETTE_LIGHT=['#4f46e5','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d','#ea580c','#6b7280'];function getPalette(){return currentTheme==='light'?PALETTE_LIGHT:PALETTE;}const CAT_COLORS={office:'#636efa',dev:'#10b981',browser:'#f59e0b',social:'#ef4444',entertainment:'#8b5cf6',tool:'#06b6d4',other:'#64748b'};const CAT_COLORS_LIGHT={office:'#4f46e5',dev:'#059669',browser:'#d97706',social:'#dc2626',entertainment:'#7c3aed',tool:'#0891b2',other:'#6b7280'};function getCatColor(cat){const m=currentTheme==='light'?CAT_COLORS_LIGHT:CAT_COLORS;return m[cat]||m.other;}

const NAME_MAP={
'MARVIS.EXE':{zh:'Marvis',en:'Marvis'},'EXPLORER.EXE':{zh:'文件资源管理器',en:'Explorer'},
'CHROME.EXE':{zh:'Chrome',en:'Chrome'},'MSEDGE.EXE':{zh:'Edge',en:'Edge'},
'FIREFOX.EXE':{zh:'Firefox',en:'Firefox'},'WINWORD.EXE':{zh:'Word',en:'Word'},
'EXCEL.EXE':{zh:'Excel',en:'Excel'},'POWERPNT.EXE':{zh:'PPT',en:'PPT'},
'OUTLOOK.EXE':{zh:'Outlook',en:'Outlook'},'VSCODE.EXE':{zh:'VS Code',en:'VS Code'},
'WECHAT.EXE':{zh:'微信',en:'WeChat'},'QQ.EXE':{zh:'QQ',en:'QQ'},
'STEAM.EXE':{zh:'Steam',en:'Steam'},'SPOTIFY.EXE':{zh:'Spotify',en:'Spotify'},
'QQMUSIC.EXE':{zh:'QQ音乐',en:'QQ Music'},'IDLE':{zh:'空闲',en:'Idle'}
};

function cnName(n){const k=(n||'').toUpperCase();if(NAME_MAP[k])return NAME_MAP[k][currentLang]||NAME_MAP[k].zh;return (n||'').replace(/\.exe$/i,'').replace(/[-_]/g,' ');}

function fmtTime(s){
    if(!s||s<60)return '0 '+t('fmtM');
    const h=Math.floor(s/3600),m=Math.round((s%3600)/60);
    if(currentLang==='zh')return (h?h+' '+t('fmtH')+' ':'')+(m?m+' '+t('fmtM'):h?'':'');
    return (h?h+t('fmtH')+' ':'')+(m?m+t('fmtM'):h?'':'');
}
function fmtShort(s){if(!s||s<60)return '<1m';const h=Math.floor(s/3600),m=Math.round((s%3600)/60);return (h?h+'h':'')+(m?(h?' ':'')+m+'m':'');}

function getRange(){
    const n=new Date(),t=n.toISOString().slice(0,10);
    if(currentRange==='today')return{s:t,e:t};
    if(currentRange==='week'){const d=new Date(n);d.setDate(d.getDate()-(d.getDay()||7)+1);return{s:d.toISOString().slice(0,10),e:t};}
    if(currentRange==='month')return{s:n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-01',e:t};
    return{s:document.getElementById('dateStart').value||t,e:document.getElementById('dateEnd').value||t};
}
async function fetchAPI(url){try{const r=await fetch(url);return r.json();}catch(e){return null;}}

function toggleTheme(){
    currentTheme=currentTheme==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',currentTheme);
    document.querySelectorAll('.theme-toggle span').forEach(s=>s.classList.toggle('active',s.dataset.tt===currentTheme));
    localStorage.setItem('screen_time_theme',currentTheme);
    if(typeof lastDonutApps!=='undefined')drawDonut(lastDonutApps);
    if(typeof lastBarData!=='undefined')drawBars(lastBarData,lastBarLabels);
    if(typeof lastHeatmap!=='undefined')drawHeatmap(lastHeatmap);
}
function switchLang(l){
    currentLang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
    document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});
    refresh();
}
var lastDonutApps=[],lastBarData=[],lastBarLabels=[],lastHeatmap=null;

function drawDonut(apps){
    lastDonutApps=apps;const canvas=document.getElementById('donutCanvas');if(!canvas)return;
    const ctx=canvas.getContext('2d'),cx=65,cy=65,r=48,ir=24;ctx.clearRect(0,0,130,130);
    const top5=(apps||[]).slice(0,5);const total=top5.reduce((s,a)=>s+(a.foreground_seconds||a.total_seconds||0),0);
    const legend=document.getElementById('donutLegend');
    if(!total){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='var(--tint-hover)';ctx.lineWidth=7;ctx.stroke();legend.innerHTML='<span style="font-size:10px;color:var(--text-dim)">'+t('noData')+'</span>';return;}
    let angle=-Math.PI/2,items='';
    top5.forEach((app,i)=>{
        const sec=app.foreground_seconds||app.total_seconds||0,slice=(sec/total)*Math.PI*2;
        ctx.beginPath();ctx.arc(cx,cy,r,angle,angle+slice);ctx.arc(cx,cy,ir,angle+slice,angle,true);ctx.closePath();
        ctx.fillStyle=getPalette()[i];ctx.fill();angle+=slice;
        items+='<span class="legend-item"><span class="legend-dot" style="background:'+getPalette()[i]+'"></span>'+cnName(app.process_name)+' '+Math.round(sec/total*100)+'%</span>';
    });
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text');ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(fmtShort(total),cx,cy-2);ctx.font='9px sans-serif';ctx.fillText(currentLang==='zh'?'总计':'Total',cx,cy+12);
    legend.innerHTML=items;
}

function drawBars(data,labels){
    lastBarData=data;lastBarLabels=labels;
    const c=document.getElementById('barChart'),maxV=Math.max(...data,1);
    c.innerHTML=data.map((v,i)=>{const pct=(v/maxV)*100;return '<div class="bar-group'+(i===selectedBar?' selected':'')+'" data-idx="'+i+'" onclick="onBarClick('+i+')"><div class="bar-value">'+(v>0?fmtShort(v):'')+'</div><div class="bar-track"><div class="bar-fill" style="height:'+Math.max(pct,2)+'%"></div></div><div class="bar-label">'+(labels?labels[i]:i+t('fmtH'))+'</div></div>';}).join('');
}

function onBarClick(idx){selectedBar=(selectedBar===idx)?-1:idx;refresh();}

function drawHeatmap(data){
    lastHeatmap=data;if(!data)return;
    const g=document.getElementById('heatmapGrid'),weekdays=I18N[currentLang].weekdays;
    let html='<div class="hm-label"></div>';
    for(let h=0;h<24;h++)html+='<div class="hm-label" style="font-size:9px;text-align:center">'+h+'</div>';
    data.forEach((d,i)=>{const s=getComputedStyle(document.documentElement);
        html+='<div class="hm-label">'+weekdays[i]+'</div>';
        (d.hours||[]).forEach((v,h)=>{
            const intensity=Math.min(v/3600,1);
            let color;
            if(intensity===0)color='var(--tint)';
            else if(intensity<.15)color='var(--tint-hover)';
            else if(intensity<.35)color=s.getPropertyValue('--heatmap-2').trim();
            else if(intensity<.6)color=s.getPropertyValue('--heatmap-3').trim();
            else color=s.getPropertyValue('--heatmap-4').trim();
            html+='<div class="hm-cell" style="background:'+color+'" title="'+d.date+' '+h+':00 - '+fmtShort(v)+'"></div>';
        });
    });
    g.innerHTML=html;
}

function renderCats(cats){
    const el=document.getElementById('catList');if(!cats||!cats.length){el.innerHTML='<span style="color:var(--text-dim)">'+t('noData')+'</span>';return;}
    const total=cats.reduce((s,c)=>s+(c.sec||0),0)||1;
    el.innerHTML=cats.slice(0,7).map(c=>{const pct=Math.round((c.sec||0)/total*100),color=getCatColor(c.cat);return '<div class="cat-item"><div class="cat-name">'+tc(c.cat)+'</div><div class="cat-val" style="color:'+color+'">'+fmtShort(c.sec||0)+'</div><div class="cat-pct">'+pct+'%</div></div>';}).join('');
}

function renderTable(apps,totalSec){
    const tbody=document.getElementById('tableBody');
    if(!apps||!apps.length){tbody.innerHTML='<tr><td colspan="6" class="empty-state">'+t('noData')+'</td></tr>';return;}
    const sorted=[...apps].sort((a,b)=>{const sa=a.foreground_seconds||a.total_seconds||0,sb=b.foreground_seconds||b.total_seconds||0;return sb-sa;});
    tbody.innerHTML=sorted.slice(0,15).map((app,i)=>{
        const sec=app.foreground_seconds||app.total_seconds||0,pct=totalSec>0?Math.round(sec/totalSec*100):0;
        const sw=app.switch_count||app.total_switches||0,nf=app.notification_count||0,color=getPalette()[i%PALETTE.length];
        return '<tr><td style="color:var(--text-dim);width:28px">'+(i+1)+'</td><td class="name" onclick="drillDown(\''+app.process_name+'\')"><span style="display:inline-block;width:6px;height:6px;border-radius:2px;background:'+color+';margin-right:6px"></span>'+cnName(app.process_name)+'</td><td class="time">'+fmtTime(sec)+'</td><td>'+pct+'% <span class="progress-bar"><span class="progress-fill" style="width:'+pct+'%;background:'+color+'"></span></span></td><td>'+sw+'</td><td style="color:var(--red)">'+(nf||'--')+'</td></tr>';
    }).join('');
}

async function drillDown(proc){
    const d=await fetchAPI(API+'/drilldown/'+encodeURIComponent(proc));
    if(!d)return;
    document.getElementById('modalTitle').textContent=cnName(proc)+' ('+proc+')';
    const c=document.getElementById('modalChart'),maxV=Math.max(...d.hourly,1);
    c.innerHTML=d.hourly.map((v,i)=>{const pct=(v/maxV)*100;return '<div class="bar-group"><div class="bar-value">'+(v?fmtShort(v):'')+'</div><div class="bar-track"><div class="bar-fill" style="height:'+Math.max(pct,2)+'%;background:var(--amber)"></div></div><div class="bar-label">'+i+'h</div></div>';}).join('');
    document.getElementById('modalTabs').innerHTML=(d.tabs||[]).map(t=>'<span class="tab-chip">'+t+'</span>').join('');
    document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e){if(!e||e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('show');}

function exportCSV(){const range=getRange();window.open(API+'/export?start='+range.s+'&end='+range.e,'_blank');}

function updateRefreshTime(){document.getElementById('refreshTime').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function updateCurrentTime(){
    const now = new Date();
    const timeStr = now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    document.getElementById('currentTime').textContent = timeStr;
}

function drawSparkline(elId, data){
    const c=document.getElementById(elId);if(!c)return;
    const ctx=c.getContext('2d'),w=c.width,h=c.height;
    ctx.clearRect(0,0,w,h);
    if(!data||data.length<2)return;
    const maxV=Math.max(...data,1),minV=Math.min(...data);
    const range=maxV-minV||1;
    ctx.beginPath();ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();ctx.lineWidth=1.5;ctx.fillStyle='transparent';
    data.forEach((v,i)=>{
        const x=(i/(data.length-1))*w;
        const y=h-((v-minV)/range)*(h-4)-2;
        if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim().replace(')',',.15)').replace('rgb','rgba');if(ctx.fillStyle===getComputedStyle(document.documentElement).getPropertyValue('--accent').trim())ctx.fillStyle='rgba(99,110,250,.15)';
    ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();
}

async function loadSystemMetrics(){
    const d=await fetchAPI(API+'/system');if(!d)return;
    if(d.latest){
        document.getElementById('cpuVal').textContent=(d.latest.cpu_percent||0).toFixed(1)+'%';
        document.getElementById('memVal').textContent=(d.latest.mem_percent||0).toFixed(1)+'%';
        document.getElementById('cpuSub').textContent='平均 '+(d.avg_cpu||0).toFixed(1)+'%';
        document.getElementById('memSub').textContent='平均 '+(d.avg_mem||0).toFixed(1)+'%';
        // 新字段
        document.getElementById('cpuCores').textContent=(d.latest.cpu_cores||0);
        document.getElementById('gpuVal').textContent=(d.latest.gpu_percent||0).toFixed(1)+'%';
        document.getElementById('memUsedGb').textContent=(d.latest.mem_used_gb||0).toFixed(1)+' GB';
    }
    if(d.recent){
        drawSparkline('sparkCpu',d.recent.map(r=>r.cpu_percent||0));
        drawSparkline('sparkMem',d.recent.map(r=>r.mem_percent||0));
    }
}

async function loadBrowserTabs(){
    const d=await fetchAPI(API+'/browser-tabs');if(!d)return;
    document.getElementById('tabCount').textContent=d.count||0;
    if(d.tabs&&d.tabs.length>0){
        document.getElementById('browserTabsBox').style.display='';
        document.getElementById('browserTabsList').innerHTML=d.tabs.map(t=>'<div class="tab-item"><span class="tab-time">'+t.time.slice(0,5)+'</span><span class="tab-browser">'+(t.process_name||'').replace('.exe','')+'</span><span class="tab-title">'+(t.window_title||'--')+'</span></div>').join('');
    }
}

async function loadStreaks(){
    const d=await fetchAPI(API+'/streaks');if(!d)return;
    if(d.current_streak>=2){
        document.getElementById('streakBadge').style.display='flex';
        document.getElementById('streakDays').textContent=d.current_streak;
    }
}

async function loadWeeklySummary(){
    const d=await fetchAPI(API+'/weekly-summary');if(!d)return;
    const el=document.getElementById('ovActiveSub');
    if(d.change_pct!==0){
        const cls=d.change_pct>0?'trend-up':'trend-down';
        const arrow=d.change_pct>0?'\u2191':'\u2193';
        el.innerHTML=el.textContent+' <span class="'+cls+'">'+arrow+Math.abs(d.change_pct)+'% vs \u4e0a\u5468</span>';
    }
}

function applyCustomRange(){currentRange='custom';refresh();}

async function refresh(){
    const range=getRange(),n=new Date();
    document.getElementById('headerDate').textContent=range.s===range.e?n.getFullYear()+(currentLang==='zh'?'年':'/')+(n.getMonth()+1)+(currentLang==='zh'?'月':'/')+n.getDate()+(currentLang==='zh'?'日':''):range.s+' ~ '+range.e;

    let apps=[],hourly=[],totalSec=0;

    if(currentRange==='today'){
        const d=await fetchAPI(API+'/today');
        if(d){apps=d.apps||[];hourly=d.hourly||[];totalSec=d.total_active_seconds||0;
            document.getElementById('ovActive').textContent=fmtTime(totalSec);
            document.getElementById('ovActiveSub').textContent=t('asOf')+' '+n.getHours()+':'+String(n.getMinutes()).padStart(2,'0');
            document.getElementById('ovApps').textContent=apps.length + (currentLang==='zh'?' 个应用':' apps');
            document.getElementById('ovPickups').textContent=apps.reduce((s,a)=>s+(a.switch_count||0),0)+' '+t('fmtCount');
            document.getElementById('ovPickupsSub').textContent=currentLang==='zh'?'应用切换总次数':'total switches';
            document.getElementById('ovNotif').textContent=(d.notification_count||0)+' '+t('fmtItem');
            document.getElementById('ovNotifSub').textContent=currentLang==='zh'?'来自推送':'from notifications';
            document.getElementById('ovIdle').textContent=fmtTime(d.idle_seconds||0);
            document.getElementById('ovIdleSub').textContent=currentLang==='zh'?'无键鼠操作':'no input';
            renderCats(d.categories);
            document.getElementById('chartTitle').textContent=currentLang==='zh'?'每小时使用趋势':'Hourly Trend';
            drawBars(hourly,null);
        }
    } else {
        const d=await fetchAPI(API+'/custom-range?start='+range.s+'&end='+range.e);
        if(d){apps=d.apps||[];totalSec=d.total_seconds||0;
            const days=d.days||1;
            document.getElementById('ovActive').textContent=fmtTime(Math.round(totalSec/days));
            document.getElementById('ovActiveSub').textContent=t('dailyAvg')+' '+days+' '+t('daysStat');
            document.getElementById('ovApps').textContent=apps.length + (currentLang==='zh'?' 个应用':' apps');
            document.getElementById('ovPickups').textContent=apps.reduce((s,a)=>s+(a.total_switches||0),0)+' '+t('fmtCount');
            document.getElementById('ovPickupsSub').textContent='';
            document.getElementById('ovNotif').textContent='--';document.getElementById('ovNotifSub').textContent='';
            document.getElementById('ovIdle').textContent='--';document.getElementById('ovIdleSub').textContent='';
            renderCats(d.categories);
            document.getElementById('chartTitle').textContent=currentLang==='zh'?'每日使用趋势':'Daily Trend';
            const secs=(d.daily||[]).map(x=>x.total_active_seconds||0);
            const labels=(d.daily||[]).map(x=>(x.date||'').slice(5));
            selectedBar=-1;drawBars(secs,labels);
        }
    }
    drawDonut(apps);renderTable(apps,totalSec);

    const hm=await fetchAPI(API+'/heatmap');if(hm)drawHeatmap(hm.heatmap);
    const sc=await fetchAPI(API+'/score');
    if(sc){
        const scoreEl=document.getElementById('ovScore');
        const scoreLabels=currentLang==='zh'?{80:'优秀',60:'良好',40:'一般',0:'待提升'}:{80:'Excellent',60:'Good',40:'Fair',0:'Needs work'};
        const scoreLabel=Object.entries(scoreLabels).sort((a,b)=>b[0]-a[0]).find(([k])=>sc.score>=+k)?.[1]||'';
        scoreEl.textContent=sc.score+' '+scoreLabel;
        // 动态设置颜色
        const colorMap={'green':'var(--green)','amber':'var(--amber)','red':'var(--red)'};
        scoreEl.style.color=colorMap[sc.color]||'var(--amber)';
    }
    const ins=await fetchAPI(API+'/insights');
    const el=document.getElementById('insightsContent');
    if(ins){if(!ins.ready)el.innerHTML='<div class="insight-wait">'+ins.message+'</div>';
    else if(!ins.insights||!ins.insights.length)el.innerHTML='<div class="insight-wait">'+t('goodHabit')+'</div>';
    else el.innerHTML=ins.insights.map(i=>'<div class="insight-item">'+i+'</div>').join('');}
    loadSystemMetrics().catch(e=>console.error('loadSystemMetrics error:',e));
    loadBrowserTabs().catch(e=>console.error('loadBrowserTabs error:',e));
    loadStreaks().catch(e=>console.error('loadStreaks error:',e));
    loadWeeklySummary().catch(e=>console.error('loadWeeklySummary error:',e));
    updateRefreshTime();
}

document.querySelectorAll('.tab').forEach(btn=>{btn.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');currentRange=this.dataset.range;
    document.getElementById('datePicker').style.display=currentRange==='custom'?'flex':'none';
    selectedBar=-1;refresh();
});});

var savedTheme=localStorage.getItem('screen_time_theme')||'dark';
currentTheme=savedTheme;document.documentElement.setAttribute('data-theme',savedTheme);
document.querySelectorAll('.theme-toggle span').forEach(s=>s.classList.toggle('active',s.dataset.tt===savedTheme));

console.log('Page loaded, calling refresh...');
refresh();setInterval(refresh,5000);
updateCurrentTime();setInterval(updateCurrentTime,1000);
</script>
</body>
</html>
